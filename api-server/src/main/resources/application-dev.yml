spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/technews_dev?sslmode=disable
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

logging:
  level:
    com.technews: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  secret: dev-secret-key-for-testing-only-not-for-production-use
