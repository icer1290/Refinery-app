spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:news_aggregator}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-please-change-in-production}
  expiration: 86400000  # 24 hours in milliseconds

# Logging
logging:
  level:
    com.technews: INFO
    org.springframework.security: INFO

# AI Engine Configuration
ai-engine:
  base-url: http://technews-ai-engine:8000
  deepsearch:
    path: /api/v1/deepSearch
    timeout: 300000