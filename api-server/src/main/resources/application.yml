spring:
  application:
    name: tech-news-api

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/news_aggregator?sslmode=disable
    username: falletter
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  address: 0.0.0.0

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-please-change-in-production}
  expiration: 86400000000

# Logging
logging:
  level:
    com.technews: DEBUG
    org.springframework.security: INFO

# AI Engine Configuration
ai-engine:
  base-url: http://localhost:8000
  deepsearch:
    path: /api/v1/deepSearch
    timeout: 300000
