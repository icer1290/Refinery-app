spring:
  application:
    name: tech-news-api

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/technews?sslmode=disable
    username: falletter
    password: 
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-please-change-in-production}
  expiration: 86400000  # 24 hours in milliseconds

# AI Engine Configuration
ai-engine:
  base-url: ${AI_ENGINE_URL:http://localhost:8000}

# Logging
logging:
  level:
    com.technews: DEBUG
    org.springframework.security: INFO
