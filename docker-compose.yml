services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: technews-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: news_aggregator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - technews-network

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: technews-ai-engine
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/news_aggregator
      # LangSmith Tracing
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-default}
      # LLM Configuration
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-v4}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-qwen3.5-35b-a3b}
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"  # 确保日志实时刷新，不被缓存
      FORCE_COLOR: "1"       # 强制许多 Python 库（如 Rich, Typer）输出颜色
    tty: true              # 保持容器运行，不自动退出
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - technews-network

  scheduler:
    image: alpine:latest
    container_name: technews-scheduler
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - ai-engine
    networks:
      - technews-network
    command: >
      sh -c "apk add --no-cache curl tzdata && cp /usr/share/zoneinfo/Asia/Shanghai /etc/localtime && echo 'Scheduler started, will run daily at 10:00 Asia/Shanghai' && while true; do current_time=$$(date +%H:%M); if [ \"$$current_time\" = '10:00' ]; then echo \"$$(date '+%Y-%m-%d %H:%M:%S') - Triggering daily workflow...\" && curl -X POST \"$$AI_ENGINE_URL/api/v1/workflow/run\" -H 'Content-Type: application/json' -d '{}' -s -w '\nHTTP Status: %{http_code}\n' && echo \"$$(date '+%Y-%m-%d %H:%M:%S') - Workflow triggered\" && sleep 60; fi; sleep 30; done"

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: technews-api-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: news_aggregator
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-here-please-change-in-production}
      SPRING_OUTPUT_ANSI_ENABLED: ALWAYS
    tty: true              # 保持容器运行，不自动退出
    depends_on:
      postgres:
        condition: service_healthy
      ai-engine:
        condition: service_started
    networks:
      - technews-network

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: technews-nginx
    ports:
      - "80:80"
    depends_on:
      api-server:
        condition: service_started
    networks:
      - technews-network

volumes:
  postgres_data:

networks:
  technews-network:
    driver: bridge
