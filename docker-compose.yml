services:
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: technews-api-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: news_aggregator
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-your-256-bit-secret-key-here-please-change-in-production}
      SPRING_OUTPUT_ANSI_ENABLED: ALWAYS
      AI_ENGINE_URL: http://host.docker.internal:8000
    tty: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: technews-nginx
    ports:
      - "80:80"
    depends_on:
      api-server:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"